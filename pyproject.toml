[project]
name = "asdabot"
version = "0.1.0"
description = "CLI for autonomous grocery shopping on ASDA"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "algoliasearch>=4.37.1",
    "camoufox>=0.4.11",
    "httpx>=0.28.1",
    "playwright>=1.58.0",
    "python-dotenv>=1.0.1",
    "rich>=14.3.3",
    "typer>=0.24.1",
]

[project.scripts]
asda = "asdabot.cli:main"

[dependency-groups]
dev = [
    "ruff>=0.15.6",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
